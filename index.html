<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#09090b" />
    <meta
      name="description"
      content="NPC Services - Strategic Property Investment Advisory"
    />
    <title>NPC Services | Private Advisory</title>
    
    <!-- Fonts: Playfair Display (Serif) for headings, Inter (Sans) for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                100: '#f9f1d8',
                200: '#f0dfaa',
                300: '#e6cc7d',
                400: '#deb853',
                500: '#d4af37', // Base Gold
                600: '#aa8c2c',
                700: '#806921',
                800: '#554616',
                900: '#2b230b',
              },
              charcoal: {
                800: '#1f1f1f',
                900: '#121212',
                950: '#0a0a0a', // Deep Matte Black
              }
            },
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Inter"', 'sans-serif'],
            },
            backgroundImage: {
              'luxury-gradient': 'linear-gradient(to bottom right, #1a1a1a, #0a0a0a)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0a0a0a;
        color: #f5f5f5;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Playfair Display', serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #d4af37;
      }
      
      .fade-enter {
        opacity: 0;
        transform: translateY(20px);
      }
      .fade-enter-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 700ms ease-out, transform 700ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }
    </style>
  <script type="importmap">

</script>
</head>
