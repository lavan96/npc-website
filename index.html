<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#09090b" />
    <meta
      name="description"
      content="NPC Services - Strategic Property Investment Advisory"
    />
    <title>NPC Services | Private Advisory</title>
    
    <!-- Fonts: Cormorant Garamond (Serif) for headings, Montserrat (Sans) for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                100: '#FAF7EE',
                200: '#EBE2CD',
                300: '#DCCDAA',
                400: '#CEB887',
                500: '#C2A364', // Base Gold
                600: '#9C8049',
                700: '#755F35',
                800: '#4D3E21',
                900: '#261E0E',
              },
              charcoal: {
                800: '#1C1B19',
                900: '#141311',
                950: '#0C0C0B', // Deep Matte Black/Brown
              }
            },
            fontFamily: {
              serif: ['"Cormorant Garamond"', 'serif'],
              sans: ['"Montserrat"', 'sans-serif'],
            },
            backgroundImage: {
              'luxury-gradient': 'radial-gradient(ellipse at top, #141311, #0C0C0B)',
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #0C0C0B;
        color: #f5f2ed;
        font-family: 'Montserrat', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Cormorant Garamond', serif;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: #0C0C0B;
      }
      ::-webkit-scrollbar-thumb {
        background: #261E0E;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #C2A364;
      }
      
      /* Utilities */
      .glass-panel {
        background: rgba(20, 19, 17, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(194, 163, 100, 0.1);
      }
      
      .text-balance {
        text-wrap: balance;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
